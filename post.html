<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: Arial;
            /* background: linear-gradient(to right, #dfe9f3, #ffffff); */
            background: url("nature.webp");
            margin: 0;
            /* padding: 20px; */
            background-repeat: no-repeat;
            background-size: cover;
            overflow-y: hidden;
            height: auto;
        }

        #ul {
            list-style: none;
            display: flex;
            border: 1px solid;
            gap: 2em;
            visibility: hidden;
            padding: 20px;
        }

        #ul li {
            width: 250px;
            height: 400px;
            border: 0px;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0px 5px 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.2s ease-in-out;
        }

        #ul li:hover {
            transform: translateY(-5px);
        }

        #ul li img {
            width: 100%;
            height: 150px;
            /* object-fit: cover; */
        }

        #ul li p {
            color: green;
            margin-top: 0px;
        }

        #ul li h4 {
            margin-bottom: 0px;
        }

        #ul li button {
            position: absolute;
            top: 200px;
            right: 10px;
            border: 0px;
        }

        #form {
            height: auto;
            width: 250px;
            /* border: 1px solid; */
            border-radius: 15px;
            padding: 20px;
            background: #7884987c;
            display: flex;
            justify-content: center;
            align-items: center;
            /* animation: coding 2s ease 1s infinite alternate; */
            z-index: 2;
            
        }

        #form input {
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 10px;
            outline: none;
            border: 0px;
            background-color: #ffffff;
        }

        #form textarea {
            width: 200px;
            border-radius: 15px;
            height: 150px;
            outline: none;
            margin-bottom: 10px;
        }

        #form button {
            width: 100px;
            border-radius: 20px;
            border: 0px;
            height: 30px;
            background: linear-gradient(90deg,rgba(255, 255, 255, 0.694),rgba(128, 128, 128, 0.738));
            cursor: pointer;
            transition: all 0.5s ease;
        }

        #form button:hover {
            transform: translateZ(10px);
            background:linear-gradient(90deg,);
            box-shadow: 0px 3px 11px;
        }

        /* @keyframes coding {
            0% {
                background-color: red;
            }

            25% {
                background-color: blue;
            }

            50% {
                background-color: green;
            }

            75% {
                background-color: orange;
            }

            100% {
                background-color: yellow;
            }

        } */
        #div {
            width: 100%;
            height: 100vh;
            z-index: 1;
            /* position: absolute; */
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            background-color: rgba(0, 0, 0, 0.551);
        }
    </style>
</head>

<body>
    <div id="div">
        <form id="form">
            <table>
                <tr>
                    <td><input type="text" name="title" placeholder="Enter title" id="title"> </td>
                </tr>
                <tr>
                    <td><input type="text" name="thumbnail" placeholder="Enter thumbnail" id="thumbnail"></td>
                </tr>
                <tr>
                    <td><textarea name="textarea" id="desc"></textarea></td>
                </tr>
                <tr>
                    <td> <button id="btn" onclick="fun(event)">Add Post</button>
                        <button id="btn2" onclick="func(event)">Get Post</button>
                    </td>
                </tr>
            </table>

        </form>
    </div>

    <ul id="ul">
    </ul>
    <script>
        function func(ev) {
            var ul = document.getElementById("ul")
            ul.style.visibility = "visible"
            ev.preventDefault()
            fetch("http://localhost:3000/posts", { method: "GET" })
                .then((res) => { return res.json() })
                .then(function (data) {

                    ul.innerHTML = ""
                    data.forEach(function (post) {

                        var li = `
                        <li>
                            <img src="${post.thumbnail}">
                            <h4>${post.title}<h4>
                            <p>${post.desc}</p>    
                            <button onclick="click(${post.id})"><i class="bi bi-heart" style="color: red;font-size: 1.5em;"><span id="span"></span></i></button>

                        </li>
                        `
                        ul.innerHTML += li

                    })
                })
        }


        function fun(ev) {
            var title = document.getElementById("title").value
            var desc = document.getElementById("desc").value
            var thumb = document.getElementById("thumbnail").value
            ev.preventDefault()
            fetch("http://localhost:3000/posts",
                {
                    method: "POST",
                    headers: {
                        "Content-type": "application/json"
                    },
                    body: JSON.stringify({
                        title: title,
                        desc: desc,
                        thumbnail: thumb
                    })
                })
            // .then(res => { return res.json() }).then(data => {

            //     var ul = document.getElementById("ul")
            //     var li = `
            //         <li>
            //             <img src="${data.thumbnail}">
            //             <h4>${data.title}<h4>
            //             <p>${data.desc}</p>    
            //         </li>

            //         `
            //     ul.innerHTML += li
            //     console.log(data)
            // })

        }
    </script>
</body>

</html>
