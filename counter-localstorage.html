<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="h1">Counter :0</h1>
    <button id="btn2" onclick="fun2()">decrement</button>
    <button id="btn1" onclick="fun1()">increment</button>
    <script>
        var count = 0
        if (window.localStorage.getItem("count")) {
            count = window.localStorage.getItem("count")
            console.log(count)
            document.getElementById("h1").innerText = "Counter :" + count

        }
        function fun1() {
            count++
            window.localStorage.setItem("count", JSON.stringify(count))
            document.getElementById("h1").innerText = "Counter :" + count
            // count=window.localStorage.getItem("count")

        }
        function fun2() {
            count--
            window.localStorage.setItem("count", JSON.stringify(count))
            document.getElementById("h1").innerText = "Counter :" + count

            // count=window.localStorage.getItem("count")

        }
    </script>
</body>

</html>
