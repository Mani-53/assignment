<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Card</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f2f2f2;
    font-family: Arial, sans-serif;
}

/* Card Container */
.card {
    width: 300px;
    height: 400px;
    perspective: 1000px;
}

/* Inner wrapper */
.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

/* Flip on hover */
.card:hover .card-inner {
    transform: rotateY(180deg);
}

/* Front & Back */
.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    overflow: hidden;
}

/* Front Design */
.card-front {
    background: white;
    text-align: center;
}

.card-front img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card-front h3 {
    margin: 15px 0;
}

/* Back Design */
.card-back {
    background: #2e7d32;
    color: white;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    text-align: center;
}

.card-back p {
    margin-bottom: 15px;
}

.card-back button {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #2e7d32;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <div class="card-inner">

        <!-- Front -->
        <div class="card-front">
            <img src="https://via.placeholder.com/300x250" alt="Product">
            <h3>Wireless Headphones</h3>
        </div>

        <!-- Back -->
        <div class="card-back">
            <p>High quality sound with noise cancellation and long battery life.</p>
            <h2>$99.99</h2>
            <button>Add to Cart</button>
        </div>

    </div>
</div>

</body>
</html>
