<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <input type="text" id="input" onkeyup="button()">
    <button id="btn" onclick="fun()">Add</button>

    <ul id="ul"></ul>
    <script>

        document.getElementById("btn").disabled = true

        function button() {
            if (document.getElementById("input").value == "") {
                document.getElementById("btn").disabled = true
            }
            else {
                document.getElementById("btn").disabled = false
            }
        }

        var todo = []
        // if (window.localStorage.getItem("todo")) {
        //     todo = window.localStorage.getItem("todo", todo)
        //     genui()
        // }

        function fun() {

            todo.push({ text: document.getElementById("input").value, status: false })
            console.log(todo)
            // window.localStorage.setItem("todo", JSON.stringify(todo))
            genui()
            document.getElementById("input").value = ""
            document.getElementById("btn").disabled = true
        }

        function genui() {
            // todo = window.localStorage.getItem("todo",todo)
            // console.log(todo)
            document.getElementById("ul").innerHTML = ""
            todo.forEach((val, i) => {
                var span = document.createElement("span")
                span.innerHTML = val.text
                var li = document.createElement("li")
                var del = document.createElement("button")
                del.innerText = "Delete"
                var done = document.createElement("button")
                done.innerText = "Done"
                var strike = document.createElement("strike")
                del.addEventListener("click", function () {
                    document.getElementById("ul").innerHTML = ''
                    console.log(i)
                    todo.splice(i, 1);
                    // window.localStorage.setItem("todo", JSON.stringify(todo))
                    genui();
                })
                del.disabled = true

                done.addEventListener("click", function () {
                    val.status = true
                    console.log(strike)
                    strike.appendChild(span)
                    del.disabled = false
                    done.disabled = true

                })
                if (val.status == true) {
                    strike.appendChild(span)
                    del.disabled = false
                    done.disabled = true
                }
                else {
                    li.appendChild(span)
                    del.disabled = true
                }


                li.appendChild(strike)
                li.appendChild(del)
                li.appendChild(done)
                document.getElementById("ul").appendChild(li)

            });

        }
    </script>
</body>

</html>
