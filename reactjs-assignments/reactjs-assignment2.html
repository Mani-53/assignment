<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorign src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #8e0e00, #c31432, #ff512f);
            height: 100vh;
        }

        .li {

            color: darkred;
            align-items: center;
            /* border-bottom: 10px solid white; */
            width: 300px;
            margin-top: 0px;
            margin-bottom: 10px;
            border-radius: 10px;

        }

        /* .li button {
            padding: 10px 20px;
        } */

        .main-div {
            height: auto;
            width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border: 0px solid;
            border-radius: 15px;
            background: linear-gradient(145deg, #fff5e6, #ffe0b3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .main-ul {
            margin-top: 0px;
            width: 350px;
            border: 0px solid;
            display: flex;
            justify-content: center;
            padding-left: 0px;
            flex-direction: column;
            align-items: center;
            list-style: none;
        }

        .inner-div {
            display: flex;
            gap: 2em;
            margin: 24px;
            padding-top: 20px;
        }

        .inner-div input {
            /* margin-top: 20px; */
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
            transition: 0.2s ease;
        }

        .inner-div button {
            padding: 14px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #ff5722, #ff9800);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .inner-div button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 87, 34, 0.5);
        }

        .td {
            width: 50px;
            display: flex;
            align-items: center;
            color: #4e342e;
            font-weight: 500;
            gap: 10px;
        }

        .td button {
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .td button:first-child {
            background: linear-gradient(135deg, #d32f2f, #f44336);
            color: white;
        }

        .td button:first-child:hover {
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.4);
        }

        #del {
            background: linear-gradient(135deg, #8e24aa, #d81b60);
            color: white;
        }

        #del:hover {
            box-shadow: 0 5px 15px rgba(142, 36, 170, 0.4);
        }

        .td button:hover {
            box-shadow: 0px 0px 15px rgba(173, 216, 230, 0.657);
        }

        .tr {
            /* padding: 10px; */
            /* background-color: rgba(203, 203, 224, 0.47); */
            display: flex;
            gap: 5em;
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
            transition: 0.3s ease;
        }

        .tr:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        #body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <!-- <h1>Hello React js</h1> -->
    <div id="main"></div>
    <script type="text/babel">
        var disabled = true
        var hi = true
        var temp = ""
        var todos = []
        function add() {
            document.getElementById("input").value = ""
            input()
            todos.push({ text: temp, completed: false })
            render()
        }
        function del(i) {
            todos.splice(i, 1)
            render()
        }
        function done(i) {
            todos[i].completed = !todos[i].completed
            render()
        }
        function input() {
            disabled = !disabled
            render()
        }

        console.log(todos)
        function render() {
            var jsx = <div id="body">
                <div class="main-div">
                    <div class="inner-div">
                        <input type="text" id="input" onKeyUp={(ev) => {
                            temp = ev.target.value
                        }} Placeholder="Enter todo" onInput={() => { input() }} />
                        <button onClick={() => { add() }} id="mainbtn" disabled={disabled}>Add todo</button>
                    </div>
                    <ul class="main-ul">
                        {
                            todos.map((todo, i) => {
                                return <li class="li">
                                    <table>
                                        <tr class="tr">
                                            <td class="td">
                                                {
                                                    todo.completed
                                                        ? <strike>{todo.text}</strike>
                                                        : todo.text
                                                }
                                            </td>
                                            <td class="td">
                                                <button onClick={() => { del(i) }}>Delete</button>
                                            </td>
                                            <td class="td">
                                                <button onClick={() => {
                                                    done(i)
                                                }} id="del">Done</button>
                                            </td>
                                        </tr>
                                    </table>

                                </li>
                            })
                        }
                    </ul>
                </div>
            </div >
            ReactDOM.render(jsx, document.getElementById("main"))
        }
        render()
        // Another method
        // function add() {
        //     todos.push(document.getElementById("input").value)
        //     render()
        // }
        // function render() {
        //     var jsx = <div>
        //         <input type="text" id="input" />
        //         <button onClick={() => { add() }}>Add todo</button>
        //         <ul>
        //             {
        //                 todos.map((todo) => {
        //                     return <li>{todo}</li>
        //                 })
        //             }
        //         </ul>
        //     </div>
        //     ReactDOM.render(jsx, document.getElementById("main"))
        // }
        // render()
    </script>
</body>

</html>
