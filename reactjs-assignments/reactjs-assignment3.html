<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorign src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1em;
            font-weight: 400;
            background: linear-gradient(darkblue, yellow);
            background-repeat: no-repeat;
            height: 100vh;
            box-sizing: border-box;
            margin: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btns {
            padding: 10px 15px;
            border-radius: 15px;
            border: 0px;
            background: linear-gradient(90deg, lightyellow, lightgreen);
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btns:hover {
            transform: translateY(-2px);
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.378);
        }

        #btn {
            display: flex;
            gap: 1em;
        }

        #main {
            background: linear-gradient(130deg, navy, white);
            color: #ffffff;
            width: 300px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 0px;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <div id="div"></div>
    <script type="text/babel">
        var count = 0
        var jsx = <div id="main">
            <h1>Counter:<span id="span">0</span></h1>
            <div id="btn">
                <button onClick={() => { document.getElementById("span").innerText = ++count }} class="btns">Increase</button>
                <button onClick={() => { document.getElementById("span").innerText = --count }} class="btns">Decrease</button>
            </div>

        </div>
        ReactDOM.render(jsx, document.getElementById("div"))
    </script>
</body>

</html>
