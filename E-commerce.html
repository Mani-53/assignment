<!DOCTYPE html>

    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fdfbfb, #ebedee);
            color: #1e293b;
            overflow-x: hidden;
        }

        * {
            transition: all 0.5s ease;
        }

        #ul li {
            list-style: none;
            height: 380px;
            width: 240px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            padding: 15px;
        }

        #ul li h4 {
            margin: 15px 0 10px;
            color: #374151;
        }

        #ul li img {
            height: 200px;
            width: 100%;
            border-radius: 15px;
            object-fit: cover;
        }

        #ul {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 5em;
            box-sizing: border-box;
            width: 100%;
            margin-top: 130px;
            padding: 30px;
        }


        #ul li:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(102, 166, 255, 0.2);
        }

        #div {
            height: 100vh;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            position: fixed;
            top: 0;
            left: 0;
        }


        #div2 {
            display: none;
            height: 300px;
            width: 500px;
            position: fixed;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
            padding: 20px;
            background: linear-gradient(135deg, #ffffff, #f3f4f6);
            border-radius: 20px;
            color: #333;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        a {

        }

        #ul li button {
            padding: 12px;

            cursor: pointer;
        }

        #nav {
            display: flex;
            height: 90px;

            position: fixed;
            top: 0px;
            left: 0px;
            z-index: 4;
            background: linear-gradient(90deg, #89f7fe, #66a6ff);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            color: white;
        }

        #navul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .li {
            padding: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }

        .li:hover {

        #logo {

            display: flex;

        }

        #logo img {
            width: 70px;

        #search {

        #search input {
            padding: 10px 10px;
            border-radius: 25px;
            border: 1px solid #dbeafe;
            width: 60%;
            outline: none;
        }

        #search button {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            color: #333;
            font-weight: bold;
            cursor: pointer;
        }

        #login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4);
        }

        #uldiv {

            width: 30%;

            align-items: center;

        }

        #icon {

            justify-content: center;
            font-size: 1.8em;
            gap: 10px;

    <script>
        var arr = []
        function div2(ev) {
            ev.stopPropagation();
        }
        fetch("https://dummyjson.com/products").then((res) => { return res.json() })
            .then((data) => {
                console.log(data)
                genui(data.products)
            })

        // <a href="E2-commerce.html?id=${product.id}" target="_blank">
        //     </a>
        function genui(products) {
            products.forEach(product => {
                let li = `
                 
                        <li>
                            <img src="${product.thumbnail}">
                            <h4>${product.title}</h4>
                            <button id="addbtn" onclick="add(${product.id})">ADD TO CART</button>
                        </li>
                  
                `
                document.getElementById("ul").innerHTML += li
            })



        }

        function add(id) {
            confirm("Are you really want to add..?")
            fetch(`https://dummyjson.com/products/${id}`).then(res => { return res.json() })
                .then(data => {
                    arr.push(data)
                    if (data.title == arr.title) {
                        return
                    } else {
                        window.localStorage.setItem("cart", JSON.stringify(arr))

                    }
                    // window.localStorage.setItem("length", arr.length)
                    // document.getElementById("span").innerText = arr.length
                })
        }
